---
services:
  clean:
    extends:
      file: ../assets/container/compose.yml
      service: clean

  doctest:
    extends:
      file: ../assets/container/compose.yml
      service: compile
    environment:
      PROJECT: s4-app2
      INPUT_FILE: doctest/00-plan-tests.tex
      OUTPUT_FILE: plan-tests.pdf

  doctest-watch:
    extends:
      service: app
    environment:
      REALTIME: true

  app:
    extends:
      file: ../assets/container/compose.yml
      service: compile
    environment:
      PROJECT: s4-app2
      INPUT_FILE: rapport/00-rapport.tex
      OUTPUT_FILE: chab1704-cous1912.pdf

  app-watch:
    extends:
      service: app
    environment:
      REALTIME: true
